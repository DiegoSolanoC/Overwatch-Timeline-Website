<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Main - Timeline Overwatch</title>
    <link rel="icon" type="image/png" href="assets/images/icons/Icon.png">
    <link rel="stylesheet" href="styles.css?v=57">
    <link rel="stylesheet" href="styles/entry.css?v=14">
</head>
<body>
    <header>
        <div class="header-hub" id="headerHub" aria-label="Mode hub">
            <button class="header-hub-btn" type="button" data-mode="globe" title="Global Timeline">Timeline</button>
            <button class="header-hub-btn" type="button" data-mode="glossary" title="Concept Glossary">Glossary</button>
            <button class="header-hub-btn" type="button" data-mode="biography" title="Character Bios">Bios</button>
            <div class="header-hub-stack" id="headerHubMapStack" aria-label="View controls" data-header-order="30"></div>
        </div>
        <div class="header-hub header-hub--right" id="headerHubRight" aria-label="Main menu">
            <button class="header-hub-btn header-hub-btn--exit header-hub-btn--icon" type="button" data-action="menu" title="Exit to Main Menu" aria-label="Exit to Main Menu">
                <span class="header-hub-icon-wrap">
                    <img class="header-hub-icon" src="assets/images/icons/Home Button.png" alt="" />
                </span>
                <span class="header-hub-btn-label">Exit</span>
            </button>
        </div>
        <a class="header-title-badge header-title-badge--link" id="headerTitleBadge" href="https://overwatch.blizzard.com/en-us/" target="_blank" rel="noopener noreferrer" aria-label="Open official Overwatch website" title="Go to official website">
            <svg class="header-title-badge-shape" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true" focusable="false">
                <path class="header-title-badge-path" vector-effect="non-scaling-stroke" d="M28 10 H72 Q76 10 78 14 L92 90 Q94 98 86 98 H14 Q6 98 8 90 L22 14 Q24 10 28 10 Z"></path>
            </svg>
            <img class="header-title-badge-logo" src="assets/images/misc/Website.png" alt="Overwatch Website" />
            <span class="header-title-badge-sr">Timeline Overwatch</span>
        </a>
    </header>

    <div class="header-subbar" id="headerRotateSubBar" aria-label="Rotation controls">
        <div class="header-subbar-inner" id="headerRotateSubBarInner"></div>
    </div>

    <div id="dockGlobeRailLeft" class="dock-globe-rail dock-globe-rail--left" aria-label="Transport and weather"></div>
    <div id="dockGlobeRailRight" class="dock-globe-rail dock-globe-rail--right" aria-label="Map view and rotation"></div>

    <div class="layout-container">
        <main id="content">
            <div id="globe-container"></div>
            <!-- Zoom Controls -->
            <div class="zoom-controls" id="zoomControls">
                <button class="zoom-btn zoom-in-btn" id="zoomInBtn" title="Zoom In">+</button>
                <button class="zoom-btn zoom-reset-btn" id="zoomResetBtn" title="Reset zoom and view">=</button>
                <button class="zoom-btn zoom-out-btn" id="zoomOutBtn" title="Zoom Out">−</button>
            </div>
        </main>

        <nav class="sidebar" id="sidebar">
            <div class="sidebar-close" id="sidebarClose">&times;</div>
            <button onclick="window.location.href='test.html'">Test</button>
            <button onclick="window.location.href='main.html'" class="active">Main</button>
        </nav>

        <div class="sidebar-indicator" id="sidebarIndicator">☰</div>
        
        <!-- Loading Overlay (fades in during Globe Components loading) -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-status-overlay">
                <img src="assets/images/misc/loading.gif" alt="Loading" class="loading-gif" id="loadingGif">
                <h3>Loading Status</h3>
                <div class="loading-progress-container">
                    <div class="loading-progress-bar" id="loadingProgressBar"></div>
                </div>
                <div id="overlayStatusContent"></div>
            </div>
        </div>
        
        <!-- Event Slide Panel (left side) -->
        <div class="event-slide" id="eventSlide">
            <button class="event-slide-action-btn event-slide-edit-btn" id="eventSlideEditBtn" title="Edit description" type="button">Edit</button>
            <button class="event-slide-action-btn event-slide-save-btn" id="eventSlideSaveBtn" title="Save description" type="button" style="display: none;">Save</button>
            <div class="event-slide-close" id="eventSlideClose">&times;</div>
            <div class="event-slide-content" id="eventSlideContent">
                <div class="event-slide-top" id="eventSlideTop">
                    <p id="eventSlideEra" class="event-slide-era-heading event-slide-era-heading--empty" aria-hidden="true"></p>
                    <div id="eventVariantToggles" style="display: none; margin-bottom: 15px; display: flex; gap: 8px; flex-wrap: wrap;"></div>
                    <h2 id="eventSlideTitle">Event</h2>
                    <p id="eventSlideLocation" class="event-slide-location" style="display: none;"></p>
                    <p id="eventSlideTimelineMeta" class="event-slide-timeline-meta" style="display: none;" aria-live="polite"></p>
                </div>
                <div class="event-slide-mid-controls" id="eventSlideMidControls" aria-label="Event display options">
                    <div class="event-control-buttons">
                        <button type="button" id="eventFullTextToggle" class="event-full-text-toggle-btn" aria-pressed="false">Full Text Display</button>
                        <button type="button" id="eventImageToggle" class="event-image-toggle-btn">Show Image</button>
                    </div>
                </div>
                <div class="event-slide-scrollable" id="eventSlideScrollable">
                    <p id="eventSlideText">Placeholder text for event information.</p>
                    <div class="event-sources-section" id="eventSourcesSection" style="display: none;">
                        <h4 class="event-filter-header">Sources:</h4>
                        <div class="event-sources-list" id="eventSourcesList"></div>
                    </div>
                    <div class="event-filters-section" id="eventFiltersSection" style="display: none;">
                        <div class="event-filters-list" id="eventFiltersList"></div>
                    </div>
                </div>
                <div class="event-slide-bottom" id="eventSlideBottom">
                    <div class="event-control-buttons">
                        <button type="button" id="eventGlitchToggle" class="event-glitch-toggle-btn" style="display: none;" aria-label="Glitch effect" aria-pressed="false"><span class="event-glitch-toggle-btn__icon" aria-hidden="true"></span></button>
                    </div>
                    <div class="event-navigation-buttons">
                        <button type="button" id="eventPrevBtn" class="event-nav-btn event-nav-btn--pagination-arrow" title="Previous Event" aria-label="Previous event"><img class="ui-pagination-arrow" src="assets/images/icons/Arrow Icon.png" alt="" width="26" height="26" decoding="async" /></button>
                        <button id="eventAllEventsBtn" class="event-all-events-btn" title="View All Events">All Events</button>
                        <button type="button" id="eventNextBtn" class="event-nav-btn event-nav-btn--pagination-arrow" title="Next Event" aria-label="Next event"><img class="ui-pagination-arrow ui-pagination-arrow--flip-h" src="assets/images/icons/Arrow Icon.png" alt="" width="26" height="26" decoding="async" /></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Event Image Overlay (over globe) -->
        <div class="event-image-overlay" id="eventImageOverlay">
            <div class="event-image-container" id="eventImageContainer">
                <img id="eventImage" src="" alt="Event Image" style="display: none;">
            </div>
        </div>
        
        <!-- Event Manager Panel -->
        <div class="events-manage-panel" id="eventsManagePanel">
            <div class="events-manage-close" id="eventsManageClose">&times;</div>
            <div class="events-manage-content">
                <div class="events-manage-header">
                    <div class="events-manage-title-section">
                        <div class="events-manage-title-row">
                            <h2 class="events-manage-title">Event Management</h2>
                            <button type="button" id="eventsManageToolbarToggleBtn" class="events-manage-toolbar-toggle-btn" aria-pressed="true" title="Hide or show search, filters, country, and pagination bar">Show controls</button>
                        </div>
                        <p class="events-manage-count" id="eventsCount">0 Events</p>
                    </div>
                    <div class="events-manage-actions">
                        <button id="addEventBtn" class="events-manage-action-btn">+ Add Event</button>
                        <button id="saveEventsBtn" class="events-manage-action-btn save-btn">💾 Save</button>
                        <button id="exportEventsBtn" class="events-manage-action-btn export-btn">📥 Export</button>
                    </div>
                </div>
                <div class="events-manage-controls" id="eventsManageControls">
                    <h3 class="events-manage-controls-title">Search &amp; filters</h3>
                    <div class="events-manage-search" id="eventsManageSearch">
                    <div class="events-manage-search-row events-manage-search-row--primary">
                        <label for="eventsSearchInput" class="events-search-label">Search:</label>
                        <input type="text" id="eventsSearchInput" class="events-search-input events-search-input--title" placeholder="By title..." autocomplete="off" />
                        <label for="eventsSearchFilters" class="events-search-label">Filters:</label>
                        <div class="events-search-field events-search-field--filters">
                            <input type="text" id="eventsSearchFilters" class="events-search-input" placeholder="Hero or faction, comma-separated..." autocomplete="off" />
                            <div id="eventsSearchFiltersSuggestions" class="events-search-suggestions" style="display: none;"></div>
                        </div>
                        <label for="eventsSearchCountry" class="events-search-label">Country:</label>
                        <div class="events-search-field events-search-field--country">
                            <input type="text" id="eventsSearchCountry" class="events-search-input" placeholder="By flag / country name, comma-separated..." autocomplete="off" />
                            <div id="eventsSearchCountrySuggestions" class="events-search-suggestions" style="display: none;"></div>
                        </div>
                    </div>
                    <div class="events-manage-search-row events-manage-search-row--secondary">
                        <label class="events-search-checkbox" title="Use the currently selected Filters panel items for this search">
                            <input type="checkbox" id="eventsUseFilterSelectionCheckbox" />
                            Use filter selection
                        </label>
                        <div class="events-per-page-group">
                            <label for="eventsPerPageInput" class="events-search-label">Per page:</label>
                            <input type="number" id="eventsPerPageInput" class="events-search-input events-search-input-small" min="1" step="1" value="50" />
                        </div>
                        <label class="events-search-checkbox" title="Show all events in one long page">
                            <input type="checkbox" id="eventsShowAllCheckbox" />
                            Show all
                        </label>
                        <button type="button" id="eventsSearchClear" class="events-search-clear-btn">Clear</button>
                    </div>
                    </div>
                </div>
                <div class="events-list" id="eventsList">
                    <!-- Events will be dynamically generated here -->
                </div>
                <!-- Pagination controls will be inserted here -->
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-atlas-news">
            <img src="assets/images/misc/Atlas%20News.png" alt="Atlas News" />
        </div>
        <p>&copy; Original Work by Blizzard Entertainment.</p>
    </footer>

    <!-- Load Three.js and GLTFLoader for globe -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <!-- InteractionController dependencies - load before component-loader (which imports InteractionController) -->
    <script src="src/services/MarkerPulseService.js?v=8"></script>
    <script src="src/services/MapEdgeGlowService.js?v=8"></script>
    <script src="src/services/CameraControlService.js?v=8"></script>
    <script src="src/services/MouseInteractionService.js?v=8"></script>
    <script src="src/services/TouchInteractionService.js?v=8"></script>
    <script src="src/services/MarkerInteractionService.js?v=9"></script>
    <script src="src/services/StationFollowService.js?v=8"></script>
    
    <!-- Load component loader for globe/menu/features -->
    <script type="module" src="src/app/component-loader.js?v=60"></script>
    
    <!-- Load services -->
    <script src="src/services/SoundEffectsManager.js?v=8"></script>
    <script src="src/services/GlitchTextService.js?v=10"></script>
    <script src="src/utils/FactionMatchHelpers.js?v=3"></script>
    <script src="src/services/EventDataService.js?v=8"></script>
    <script src="src/services/LocationService.js?v=8"></script>
    <script src="src/data/flagFileByCommonName.js?v=8"></script>
    <script src="src/utils/LocationFlagHelpers.js?v=9"></script>
    <script src="src/utils/EventTimelineHelpers.js?v=9"></script>
    <script src="src/services/EventRenderService.js?v=15"></script>
    <script src="src/services/EventEditService.js?v=9"></script>
    <script src="src/services/NewsTickerService.js?v=8"></script>
    <!-- EventFormService dependencies - load before EventFormService -->
    <script src="src/services/LocationFieldManager.js?v=8"></script>
    <script src="src/services/SourceFieldManager.js?v=8"></script>
    <script src="src/services/HeadlinesFieldManager.js?v=8"></script>
    <script src="src/services/FormAutocompleteService.js?v=9"></script>
    <script src="src/services/EventFormService.js?v=9"></script>
    <script src="src/services/EventDragDropService.js?v=8"></script>
    <script src="src/services/EventListenerService.js?v=12"></script>
    <script src="src/services/EventInteractionService.js?v=10"></script>
    <script src="src/services/EventInitService.js?v=8"></script>
    <script src="src/services/CityLookupService.js?v=9"></script>
    <script src="src/services/ImagePathService.js?v=8"></script>
    <script src="src/services/GlobeSyncService.js?v=8"></script>
    <!-- MusicManager dependencies - load before MusicManager -->
    <script src="src/services/MusicStateService.js?v=8"></script>
    <script src="src/services/MusicShuffleService.js?v=8"></script>
    <script src="src/services/MusicVolumeService.js?v=8"></script>
    <script src="src/services/MusicProgressService.js?v=8"></script>
    <script src="src/services/helpers/MusicPaletteDefaultHelpers.js?v=8"></script>
    <script src="src/services/MusicPlaybackService.js?v=8"></script>
    <script src="src/services/MusicFileService.js?v=8"></script>
    <script src="src/services/MusicPanelService.js?v=8"></script>
    <script src="src/services/MusicIconService.js?v=8"></script>
    <script src="src/services/MusicControlService.js?v=8"></script>
    <script src="src/services/helpers/MusicManagerInitHelpers.js?v=10"></script>
    <script src="src/services/MusicManager.js?v=12"></script>
    <!-- Filter services - load dependencies before FilterService -->
    <script src="src/services/FilterStateManager.js?v=9"></script>
    <script src="src/services/FilterImageService.js?v=8"></script>
    <!-- FilterService helpers - load before FilterService -->
    <script type="module" src="src/services/helpers/FilterButtonHelpers.js?v=8"></script>
    <script type="module" src="src/services/helpers/FilterButtonSetupHelpers.js?v=9"></script>
    <script type="module" src="src/services/helpers/FilterManifestHelpers.js?v=8"></script>
    <script type="module" src="src/services/helpers/FilterTabHelpers.js?v=8"></script>
    <script type="module" src="src/services/helpers/FilterCountHelpers.js?v=8"></script>
    <script src="src/services/FilterService.js?v=11"></script>
    <script src="src/services/SidebarService.js?v=8"></script>
    <script src="src/services/AppKeyboardShortcutsService.js?v=11"></script>
    <script src="src/services/PanelResizeService.js?v=9"></script>
    
    <!-- Load main script for sidebar and other UI -->
    <script src="script.js?v=8"></script>
    
    <!-- Shared page initialization (sidebar visibility, loader, zoom controls) -->
    <script src="src/app/page-init.js?v=8"></script>
</body>
</html>
