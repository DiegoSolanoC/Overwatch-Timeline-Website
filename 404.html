<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting…</title>
    <script>
        // GitHub Pages project site: pathname e.g. /Repo/missing → /Repo/main.html
        (function () {
            var seg = location.pathname.split('/').filter(Boolean);
            seg.pop();
            var basePath = seg.length ? '/' + seg.join('/') + '/' : '/';
            location.replace(basePath + 'main.html');
        })();
    </script>
</head>
<body>
    <p>Redirecting to the timeline…</p>
</body>
</html>
