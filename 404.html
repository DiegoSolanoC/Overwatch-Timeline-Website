<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting…</title>
    <script>
        /**
         * GitHub Pages 404 → app root (project site or user site).
         * user.github.io/Repo/bad/path → /Repo/index.html
         * user.github.io/bad → /index.html (user/org root)
         */
        (function () {
            var seg = location.pathname.split('/').filter(Boolean);
            var basePath;
            if (seg.length <= 1) {
                basePath = '/';
            } else {
                basePath = '/' + seg.slice(0, -1).join('/') + '/';
            }
            location.replace(basePath + 'index.html');
        })();
    </script>
</head>
<body>
    <p>Redirecting to the timeline…</p>
</body>
</html>
